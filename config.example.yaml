# Orchestrel unified config.
# Used by orcd (daemon), bin/orc (pi CLI wrapper), and orc (backend/UI).
# Copy to config.yaml and fill in your providers. config.yaml is gitignored.
#
# This file keeps Orchestrel's provider/model routing shape. Pi runtime resources
# such as auth, model registry data, prompt templates/commands, and skills live
# in Pi's canonical user config directory (~/.pi).

socket: ~/.orc/orcd.sock       # orcd UNIX socket path
defaultProvider: anthropic
defaultModel: sonnet
defaultCwd: ~/Code             # where new cards default their working directory

providers:
  # Pi provider routing for Anthropic models.
  # The provider id and modelID values must match models known to Pi's model registry.
  anthropic:
    label: Anthropic
    # aliases: maps semantic roles to model keys for SDK subagent spawning.
    #   primary    → opus env var fallback (ANTHROPIC_DEFAULT_OPUS_MODEL)
    #   subagent   → SDK-spawned subagents (ANTHROPIC_DEFAULT_SONNET_MODEL)
    #   lightweight → lightweight subagents like Explore (ANTHROPIC_DEFAULT_HAIKU_MODEL)
    # If omitted, positional fallback applies (1st→opus, 2nd→sonnet, 3rd→haiku).
    # If partial, unspecified aliases default to first model in the map.
    # On single-model servers (oMLX), set all aliases to the same key to avoid thrashing.
    aliases:
      primary: opus
      subagent: sonnet
      lightweight: haiku
    models:
      opus:   { label: "Opus 4.7",   modelID: claude-opus-4-7,              contextWindow: 1000000 }
      sonnet: { label: "Sonnet 4.6", modelID: claude-sonnet-4-6,            contextWindow: 1000000 }
      haiku:  { label: "Haiku 4.5",  modelID: claude-haiku-4-5-20251001,    contextWindow: 200000 }

  # Example: Claude Max subscription auth (OAuth) instead of an API key.
  # claude-max:
  #   label: Claude Max
  #   baseUrl: https://api.anthropic.com
  #   oauth: claude-max
  #   models:
  #     opus:   { label: "Opus 4.7",   modelID: claude-opus-4-7,   contextWindow: 1000000 }
  #     sonnet: { label: "Sonnet 4.6", modelID: claude-sonnet-4-6, contextWindow: 1000000 }
  #
  # oauth: claude-max requires the `claude-max` Pi extension installed at
  # ~/.pi/agent/extensions/claude-max (run scripts/install-claude-max-extension.sh).
  # orcd itself contains no provider-specific code; the extension self-registers
  # auth + Claude Code request reshaping for this provider.

  # Example: a local Pi-compatible provider/proxy route.
  # proxy:
  #   label: My Proxy
  #   baseUrl: http://127.0.0.1:3457
  #   apiKey: ${MY_PROXY_API_KEY}   # ${VAR} is resolved against process.env
  #   models:
  #     opus:   { label: "Opus 4.6",   modelID: claude-opus-4-6,   contextWindow: 200000 }
  #     sonnet: { label: "Sonnet 4.6", modelID: claude-sonnet-4-6, contextWindow: 200000 }
  #     auto:   { label: Auto,         modelID: auto,              contextWindow: 200000 }

  # AWS Bedrock — uses AWS credential chain (env vars, ~/.aws/credentials, IAM role).
  # Set up: ensure aws-cli configured or env vars AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY set.
  # bedrock:
  #   type: bedrock
  #   label: AWS Bedrock
  #   region: us-east-1
  #   # profile: default           # optional — AWS profile name
  #   models:
  #     opus:   { label: "Opus 4.6",   modelID: us.anthropic.claude-opus-4-6-20250514-v1:0,   contextWindow: 200000 }
  #     sonnet: { label: "Sonnet 4.6", modelID: us.anthropic.claude-sonnet-4-6-20250514-v1:0, contextWindow: 200000 }

  # Example: a non-Anthropic Pi provider using authToken instead of apiKey.
  # deepseek:
  #   label: DeepSeek
  #   baseUrl: http://127.0.0.1:3458
  #   authToken: ${DEEPSEEK_TOKEN}
  #   models:
  #     reasoner: { label: "V3.2 Reasoner", modelID: deepseek-reasoner, contextWindow: 128000 }
  #     chat: { label: "V3.2 Chat", modelID: deepseek-chat, contextWindow: 128000 }

  # Example: single-model local server (all aliases point to same model to avoid thrashing).
  # omlx:
  #   label: Local MLX
  #   baseUrl: http://mac.local:8000
  #   authToken: omlx
  #   aliases:
  #     primary: main
  #     subagent: main
  #     lightweight: main
  #   models:
  #     main: { label: "Qwen3 Coder", modelID: qwen3-coder-next, contextWindow: 262144 }

# Optional: memory upsert service used by orcd at session end.
# memoryUpsert:
#   enabled: true
#   baseUrl: http://localhost:3100
#   apiKey: ${MEMORY_UPSERT_KEY}
