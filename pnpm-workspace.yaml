allowBuilds:
  '@scarf/scarf': true
  better-sqlite3: true
  esbuild: true

onlyBuiltDependencies:
  - '@scarf/scarf'
  - better-sqlite3
  - esbuild

patchedDependencies:
  # Version-agnostic key (no @version) so the patch applies across pi upgrades.
  # Patch drops pi's built-in third-party model catalog, keeping only anthropic.
  # If pi refactors dist/models.js, `pnpm install` fails loudly — re-run `pnpm patch`.
  '@earendil-works/pi-ai': patches/@earendil-works__pi-ai.patch
